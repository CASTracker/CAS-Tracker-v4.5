<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAS Tracker - Iniciar sesión</title>
  <script>
    document.documentElement.dataset.theme = localStorage.getItem("casTheme") || "light";
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-panel">
      <div class="auth-actions">
        <button id="themeToggle" class="icon-btn auth-theme" type="button" aria-label="Cambiar tema">☾</button>
      </div>
      <div class="auth-heading">
        <p class="eyebrow">Programa del Diploma</p>
        <h1>CAS Tracker</h1>
        <p>Organiza experiencias, reflexiones, horario y evidencias en un solo lugar.</p>
      </div>

      <div class="auth-grid">
        <form id="loginForm" class="formulario auth-form">
          <h2>Iniciar sesión</h2>
          <label for="loginEmail">Correo</label>
          <input type="email" id="loginEmail" autocomplete="email" required>
          <label for="loginPassword">Contraseña</label>
          <input type="password" id="loginPassword" autocomplete="current-password" required>
          <button type="submit" class="btn">Entrar</button>
        </form>

        <form id="registerForm" class="formulario auth-form">
          <h2>Crear cuenta</h2>
          <label for="registerEmail">Correo</label>
          <input type="email" id="registerEmail" autocomplete="email" required>
          <label for="registerPassword">Contraseña</label>
          <input type="password" id="registerPassword" autocomplete="new-password" minlength="6" required>
          <button type="submit" class="btn secondary">Registrarme</button>
        </form>
      </div>

      <p id="msg" class="status-message" role="status"></p>
    </section>
  </main>

  <script type="module" src="./firebase-auth.js"></script>
  <script type="module" src="./script.js"></script>
</body>
</html>
